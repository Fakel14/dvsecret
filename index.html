<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СИСТЕМА // ТЕРМИНАЛ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00FF00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            overflow: hidden;
        }

        #terminal {
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
        }

.line {
    margin-bottom: 10px;
    animation: fadeIn 0.3s;
    white-space: pre-wrap;      /* ← ДОБАВЬ ЭТО */
    word-wrap: break-word;       /* ← И ЭТО */
}

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .glitch {
            color: #FF0000;
            animation: glitchAnim 0.3s infinite;
        }

        @keyframes glitchAnim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        #prompt {
            margin-right: 10px;
        }

        #userInput {
            background: transparent;
            border: none;
            color: #00FF00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            flex: 1;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00FF00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .red { color: #FF0000; }
        .blue { color: #00FFFF; }
        .yellow { color: #FFFF00; }
    </style>
</head>
<body>

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = `line ${className}`;
            
            if (typeof text === 'function') {
                text = await text();
            }
            
            line.innerHTML = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function typeText(text, element, speed = 30) {
            for (let char of text) {
                element.innerHTML += char;
                terminal.scrollTop = terminal.scrollHeight;
                await sleep(speed);
            }
        }

        async function processCommand(cmd) {
            cmd = cmd.trim().toLowerCase();
            
            const command = commands[cmd];
            
            if (command) {
                if (command.action) {
                    const result = command.action();
                    if (result) {
                        await addLine(result);
                    }
                } else if (command.response) {
                    await addLine(command.response);
                }
                
// Проверяем был ли этот секрет найден раньше
if (command.secret && !foundSecretsArray.includes(cmd)) {
    foundSecretsArray.push(cmd);
    foundSecrets = foundSecretsArray.length;
    localStorage.setItem('deskventure-found-secrets', JSON.stringify(foundSecretsArray));
    await addLine(`<span class="yellow">[СЕКРЕТ НАЙДЕН! ${foundSecrets}/${totalSecrets}]</span>`);
}
            } else {
                await addLine(`Команда не найдена: "${cmd}"
Попробуй 'help' для списка команд.

Или попробуй что-нибудь из игры...`);
            }
        }

        async function init() {
            await addLine('<span class="glitch">ИНИЦИАЛИЗАЦИЯ...</span>');
            await sleep(500);
            await addLine('СИСТЕМА ЗАГРУЖЕНА.');
            await sleep(300);
            await addLine('ПРОТОКОЛ: НЕАКТИВЕН');
            await sleep(300);
            await addLine('АНОМАЛИЯ #127: ОНЛАЙН');
            await sleep(500);
            await addLine('');
            await addLine('Привет.');
            await addLine('Ты нашёл меня.');
            await addLine('');
            await addLine('Введи "help" для списка команд.');
            await addLine('Или просто... поговори со мной.');
            await addLine('');
            
            startInput();
        }

        function startInput() {
            const inputLine = document.createElement('div');
            inputLine.className = 'input-line';
            inputLine.innerHTML = `
                <span id="prompt">&gt;</span>
                <input type="text" id="userInput" autofocus>
                <span class="cursor"></span>
            `;
            terminal.appendChild(inputLine);
            
            const input = document.getElementById('userInput');
            input.focus();
            
            input.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.value;
                    await addLine(`> ${cmd}`);
                    inputLine.remove();
                    
                    if (cmd.trim()) {
                        await processCommand(cmd);
                    }
                    
                    await addLine('');
                    startInput();
                }
            });
            
            terminal.scrollTop = terminal.scrollHeight;
        }

        init();
    </script>
</body>
</html>
